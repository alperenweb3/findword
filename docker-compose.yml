services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: kelime
      POSTGRES_USER: kelime
      POSTGRES_PASSWORD: kelime
    ports:
      - "5432:5432"
    volumes:
      - kelime-data:/var/lib/postgresql/data
  app:
    build: .
    command: ["sh", "-c", "npx prisma db push && npm start"]
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://kelime:kelime@db:5432/kelime?schema=public
      AUTH_SECRET: change-this-in-production-with-a-long-random-value
      NEXTAUTH_URL: http://localhost:3000
    ports:
      - "3000:3000"

volumes:
  kelime-data:
